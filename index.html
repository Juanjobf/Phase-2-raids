<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TBC Raid Maps - Admin Editor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  
  <style>
    body, html { margin: 0; padding: 0; height: 100%; background-color: #111; font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; background-color: #000; cursor: crosshair; }
    
    #admin-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(20, 20, 20, 0.9);
      color: white;
      padding: 15px;
      border: 2px solid #553311;
      border-radius: 8px;
      z-index: 1000; 
      width: 300px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }

    #admin-panel h3 { margin: 0 0 10px 0; color: #f8b700; }
    #admin-panel label { display: block; margin-top: 10px; font-size: 12px; color: #ccc;}
    #admin-panel input, #admin-panel select { width: 100%; padding: 5px; margin-top: 3px; box-sizing: border-box; background: #333; color: white; border: 1px solid #555; }
    #admin-panel button { width: 100%; padding: 8px; margin-top: 15px; background: #553311; color: white; border: none; cursor: pointer; font-weight: bold; }
    #admin-panel button:hover { background: #774411; }
    
    #clear-data { background: #551111; margin-top: 10px; }
    #clear-data:hover { background: #771111; }

    .leaflet-popup-content-wrapper { background: #1a1a1a; color: #f8b700; border: 1px solid #553311; }
    .leaflet-popup-tip { background: #1a1a1a; }
    
    /* Top Menu for Raid Selection */
    #raid-selector {
      position: absolute;
      top: 20px;
      left: 50px;
      z-index: 1000;
      background: rgba(20, 20, 20, 0.9);
      padding: 10px;
      border: 2px solid #553311;
      border-radius: 8px;
      color: #f8b700;
      font-weight: bold;
    }
    #raid-selector select { background: #333; color: white; border: 1px solid #555; padding: 5px; font-size: 16px; margin-left: 10px; }
  </style>
</head>
<body>

  <!-- Raid Selector (Top Left) -->
  <div id="raid-selector">
    <label for="active-raid">Select Raid:</label>
    <select id="active-raid" onchange="switchRaid()">
      <!-- Options are populated dynamically by JavaScript -->
    </select>
  </div>

  <div id="map"></div>

  <!-- The Admin Panel (Bottom Left) -->
  <div id="admin-panel">
    <h3>Add New Mob</h3>
    <p style="font-size: 12px; margin: 0; color: #aaa;">Click anywhere on the map to auto-fill Wowhead coordinates.</p>
    
    <label>Mob Name</label>
    <input type="text" id="mob-name" placeholder="e.g., Blood Elf Pack">

    <label>Type</label>
    <select id="mob-type">
      <option value="boss">Boss</option>
      <option value="melee">Trash (Melee)</option>
      <option value="caster">Trash (Caster)</option>
    </select>

    <label>Wowhead Coords (X, Y)</label>
    <div style="display: flex; gap: 5px;">
      <input type="number" id="coord-x" placeholder="X">
      <input type="number" id="coord-y" placeholder="Y">
    </div>

    <label>Notes / Strategy</label>
    <input type="text" id="mob-notes" placeholder="e.g., Interrupt the heal">

    <button onclick="saveMob()">Add to Map</button>
    <button id="clear-data" onclick="clearData()">Clear Data for THIS Raid</button>
    <button id="export-data" onclick="exportData()" style="background: #115511; margin-top: 10px;">Export ALL Data for Live Site</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <script>
    // --- 1. RAID CONFIGURATION ---
    // Add new raids here! Just provide the internal ID, display name, image file, and exact dimensions.
    const raids = {
      "tempest-keep": {
        name: "Tempest Keep",
        image: "tempest-keep-map.jpg",
        width: 1002,
        height: 668
      },
      "ssc": {
        name: "Serpentshrine Cavern",
        image: "ssc-map.jpg", 
        width: 1002,  // <-- Update these when you get your SSC image!
        height: 668  // <-- Update these when you get your SSC image!
      },
    };

    let currentRaidId = "tempest-keep"; // Default raid on load

    // --- 2. DATA MANAGEMENT & MIGRATION ---
    let allRaidData = JSON.parse(localStorage.getItem('wowRaidMaps')) || {};
    
    // Migration: If you have old Tempest Keep data, move it to the new format
    const oldTkData = localStorage.getItem('tempestKeepMobs');
    if (oldTkData && !allRaidData["tempest-keep"]) {
      allRaidData["tempest-keep"] = JSON.parse(oldTkData);
      localStorage.setItem('wowRaidMaps', JSON.stringify(allRaidData));
      localStorage.removeItem('tempestKeepMobs'); // Cleanup old data
    }

    // Ensure the current raid has an array
    if (!allRaidData[currentRaidId]) allRaidData[currentRaidId] = [];

    // --- 3. MAP SETUP ---
    const map = L.map('map', { crs: L.CRS.Simple, minZoom: -1, maxZoom: 2 });
    let currentImageOverlay = null;

    const bossLayer = L.layerGroup().addTo(map);
    const trashLayer = L.layerGroup().addTo(map);
    L.control.layers(null, { "Bosses": bossLayer, "Trash Packs": trashLayer }).addTo(map);

    // Populate the dropdown menu
    const raidSelect = document.getElementById('active-raid');
    for (const [id, data] of Object.entries(raids)) {
      const option = document.createElement('option');
      option.value = id;
      option.textContent = data.name;
      raidSelect.appendChild(option);
    }

    // --- 4. SWITCH RAID LOGIC ---
    function switchRaid() {
      currentRaidId = document.getElementById('active-raid').value;
      const config = raids[currentRaidId];

      // Ensure data array exists for the new raid
      if (!allRaidData[currentRaidId]) allRaidData[currentRaidId] = [];

      // Update image boundaries
      const bounds = [[0, 0], [config.height, config.width]];
      
      // Remove old map image and load the new one
      if (currentImageOverlay) map.removeLayer(currentImageOverlay);
      currentImageOverlay = L.imageOverlay(config.image, bounds).addTo(map);
      
      map.fitBounds(bounds);
      renderMarkers();
    }

    // --- 5. HELPERS: COORDINATES & STYLES ---
    function wowheadToLeaflet(wowheadX, wowheadY) {
      const w = raids[currentRaidId].width;
      const h = raids[currentRaidId].height;
      const x = (wowheadX / 100) * w;
      const y = h - ((wowheadY / 100) * h); 
      return [y, x];
    }

    function leafletToWowhead(lat, lng) {
      const w = raids[currentRaidId].width;
      const h = raids[currentRaidId].height;
      const wowheadX = (lng / w) * 100;
      const wowheadY = ((h - lat) / h) * 100;
      return [wowheadX.toFixed(1), wowheadY.toFixed(1)];
    }

    function getCircleStyle(type) {
      if (type === 'boss') return { color: '#ff0000', fillColor: '#ff0000', fillOpacity: 0.8, radius: 10, weight: 2 };
      if (type === 'melee') return { color: '#ffaa00', fillColor: '#ffaa00', fillOpacity: 0.6, radius: 4, weight: 2 };
      if (type === 'caster') return { color: '#aa00ff', fillColor: '#aa00ff', fillOpacity: 0.6, radius: 4, weight: 2 };
      return { color: '#ffffff', fillColor: '#ffffff', fillOpacity: 0.6, radius: 4, weight: 2 };
    }

    // --- 6. INTERACTIONS ---
    map.on('click', function(e) {
      const wowheadCoords = leafletToWowhead(e.latlng.lat, e.latlng.lng);
      document.getElementById('coord-x').value = wowheadCoords[0];
      document.getElementById('coord-y').value = wowheadCoords[1];
    });

    function renderMarkers() {
      bossLayer.clearLayers();
      trashLayer.clearLayers();

      const mobs = allRaidData[currentRaidId] || [];

      mobs.forEach(mob => {
        const coords = wowheadToLeaflet(mob.x, mob.y);
        const style = getCircleStyle(mob.type);
        const layer = (mob.type === 'boss') ? bossLayer : trashLayer;
        
        L.circle(coords, style)
         .bindPopup(`<b>${mob.name}</b> (${mob.type})<br><hr>${mob.notes}`)
         .addTo(layer);
      });
    }

    function saveMob() {
      const name = document.getElementById('mob-name').value;
      const type = document.getElementById('mob-type').value;
      const x = parseFloat(document.getElementById('coord-x').value);
      const y = parseFloat(document.getElementById('coord-y').value);
      const notes = document.getElementById('mob-notes').value;

      if (!name || isNaN(x) || isNaN(y)) {
        alert("Please enter a name and valid coordinates.");
        return;
      }

      allRaidData[currentRaidId].push({ name, type, x, y, notes });
      localStorage.setItem('wowRaidMaps', JSON.stringify(allRaidData));

      document.getElementById('mob-name').value = '';
      document.getElementById('mob-notes').value = '';
      renderMarkers();
    }

    function clearData() {
      if(confirm(`Are you sure you want to delete all saved mobs for ${raids[currentRaidId].name}?`)) {
        allRaidData[currentRaidId] = [];
        localStorage.setItem('wowRaidMaps', JSON.stringify(allRaidData));
        renderMarkers();
      }
    }

    function exportData() {
      const dataStr = JSON.stringify(allRaidData);
      const blob = new Blob([dataStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = "all_raid_mobs.json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // --- 7. INITIALIZE ---
    switchRaid(); // Loads the default map and markers on startup
  </script>
</body>
</html>
